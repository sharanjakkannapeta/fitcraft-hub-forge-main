<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2a2d3a;
      --accent: #6c63ff;
      --accent2: #00d4aa;
      --text: #e8e9f0;
      --muted: #6b7280;
      --danger: #ef4444;
      --success: #22c55e;
      --warning: #f59e0b;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ───── LOGIN PAGE ───── */
    #loginPage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 60% 40%, #1e1b4b 0%, #0f1117 60%);
    }

    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }

    .login-logo {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }

    .login-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field input {
      width: 100%;
      background: #0f1117;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus { border-color: var(--accent); }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }

    .btn-login:hover { opacity: 0.9; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 14px;
      display: none;
    }

    /* ───── ADMIN DASHBOARD ───── */
    #adminPage { display: none; }

    .sidebar {
      position: fixed;
      left: 0; top: 0;
      width: 220px;
      height: 100vh;
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 100;
    }

    .sidebar-logo {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 24px;
      padding: 0 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
      transition: all 0.2s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .nav-item:hover { background: rgba(108,99,255,0.1); color: var(--text); }
    .nav-item.active { background: rgba(108,99,255,0.15); color: var(--accent); font-weight: 500; }

    .nav-icon { font-size: 16px; width: 20px; text-align: center; }

    .logout-btn {
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--danger);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      transition: background 0.2s;
    }

    .logout-btn:hover { background: rgba(239,68,68,0.1); }

    .main {
      margin-left: 220px;
      padding: 32px;
      min-height: 100vh;
    }

    .page-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 24px;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 28px; font-weight: 700; }
    .stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* Table */
    .table-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .table-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .table-title { font-size: 15px; font-weight: 600; }

    .refresh-btn {
      padding: 6px 14px;
      background: rgba(108,99,255,0.15);
      border: 1px solid rgba(108,99,255,0.3);
      border-radius: 6px;
      color: var(--accent);
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .refresh-btn:hover { background: rgba(108,99,255,0.25); }

    table { width: 100%; border-collapse: collapse; }
    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 14px 16px;
      font-size: 13px;
      border-bottom: 1px solid rgba(42,45,58,0.5);
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }

    .status-pending { background: rgba(245,158,11,0.15); color: var(--warning); }
    .status-shipped { background: rgba(108,99,255,0.15); color: #a78bfa; }
    .status-delivered { background: rgba(34,197,94,0.15); color: var(--success); }
    .status-cancelled { background: rgba(239,68,68,0.15); color: var(--danger); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; }

    .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

    /* Tracking input */
    .tracking-input {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 8px;
      color: var(--text);
      font-size: 12px;
      width: 130px;
      outline: none;
    }

    .tracking-input:focus { border-color: var(--accent); }

    .save-btn {
      padding: 4px 10px;
      background: rgba(0,212,170,0.15);
      border: 1px solid rgba(0,212,170,0.3);
      border-radius: 5px;
      color: var(--accent2);
      font-size: 11px;
      cursor: pointer;
      margin-left: 4px;
    }

    .save-btn:hover { background: rgba(0,212,170,0.25); }

    /* Sections */
    .section { display: none; }
    .section.active { display: block; }

    @media (max-width: 768px) {
      .sidebar { width: 60px; padding: 16px 8px; }
      .sidebar-logo, .nav-label { display: none; }
      .main { margin-left: 60px; padding: 20px 16px; }
    }
  </style>
</head>
<body>

<!-- ══════════ LOGIN PAGE ══════════ -->
<div id="loginPage">
  <div class="login-box">
    <div class="login-logo">⚡ FitStore</div>
    <div class="login-sub">Admin Panel — Authorized Access Only</div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="emailInput" placeholder="admin@yourstore.com" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="••••••••" />
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">Login to Admin</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<!-- ══════════ ADMIN DASHBOARD ══════════ -->
<div id="adminPage">
  <div class="sidebar">
    <div class="sidebar-logo">⚡ Admin</div>
    <button class="nav-item active" onclick="showSection('orders')">
      <span class="nav-icon">📦</span>
      <span class="nav-label">Orders</span>
    </button>
    <button class="nav-item" onclick="showSection('products')">
      <span class="nav-icon">🏋️</span>
      <span class="nav-label">Products</span>
    </button>
    <button class="nav-item" onclick="showSection('customers')">
      <span class="nav-icon">👥</span>
      <span class="nav-label">Customers</span>
    </button>
    <button class="logout-btn" onclick="doLogout()">
      <span class="nav-icon">🚪</span>
      <span class="nav-label">Logout</span>
    </button>
  </div>

  <div class="main">

    <!-- ORDERS SECTION -->
    <div class="section active" id="section-orders">
      <div class="page-title">Orders</div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Orders</div>
          <div class="stat-value" id="statTotal">—</div>
          <div class="stat-sub">All time</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Pending</div>
          <div class="stat-value" style="color:var(--warning)" id="statPending">—</div>
          <div class="stat-sub">Need to forward to Deodap</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Shipped</div>
          <div class="stat-value" style="color:#a78bfa" id="statShipped">—</div>
          <div class="stat-sub">In transit</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Delivered</div>
          <div class="stat-value" style="color:var(--success)" id="statDelivered">—</div>
          <div class="stat-sub">Completed</div>
        </div>
      </div>

      <div class="table-card">
        <div class="table-header">
          <div class="table-title">All Orders</div>
          <button class="refresh-btn" onclick="loadOrders()">↻ Refresh</button>
        </div>
        <div id="ordersTable"><div class="loading">Loading orders...</div></div>
      </div>
    </div>

    <!-- PRODUCTS SECTION -->
    <div class="section" id="section-products">
      <div class="page-title">Products</div>
      <div class="table-card">
        <div class="table-header">
          <div class="table-title">Your Products</div>
          <button class="refresh-btn" onclick="loadProducts()">↻ Refresh</button>
        </div>
        <div id="productsTable"><div class="loading">Loading products...</div></div>
      </div>
    </div>

    <!-- CUSTOMERS SECTION -->
    <div class="section" id="section-customers">
      <div class="page-title">Customers</div>
      <div class="table-card">
        <div class="table-header">
          <div class="table-title">Registered Customers</div>
          <button class="refresh-btn" onclick="loadCustomers()">↻ Refresh</button>
        </div>
        <div id="customersTable"><div class="loading">Loading customers...</div></div>
      </div>
    </div>

  </div>
</div>

<script>
  // ══════════════════════════════════════════
  // 🔧 REPLACE THESE WITH YOUR ACTUAL VALUES
  // ══════════════════════════════════════════
  const SUPABASE_URL = pakkywdnawqrtdvoxbyo;
  const SUPABASE_ANON_KEY = eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBha2t5d2RuYXdxcnRkdm94YnlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMzAyNTAsImV4cCI6MjA5MzgwNjI1MH0.pisqNgGYJGBHk-IeKn46lPvVI0cCjPnzSO0vLIW_Pzg;
  // ══════════════════════════════════════════

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ── Check if already logged in ──
  window.onload = async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) showAdmin();
  };

  // ── Login ──
  async function doLogin() {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');

    if (!email || !password) {
      showError('Please enter email and password.'); return;
    }

    btn.disabled = true;
    btn.textContent = 'Logging in...';
    err.style.display = 'none';

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      showError('Invalid email or password. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Login to Admin';
      return;
    }

    showAdmin();
  }

  function showError(msg) {
    const err = document.getElementById('errorMsg');
    err.textContent = msg;
    err.style.display = 'block';
  }

  // ── Show Admin Dashboard ──
  function showAdmin() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'block';
    loadOrders();
  }

  // ── Logout ──
  async function doLogout() {
    await sb.auth.signOut();
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('adminPage').style.display = 'none';
  }

  // ── Navigation ──
  function showSection(name) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('section-' + name).classList.add('active');
    event.currentTarget.classList.add('active');

    if (name === 'products') loadProducts();
    if (name === 'customers') loadCustomers();
  }

  // ── Load Orders ──
  async function loadOrders() {
    const el = document.getElementById('ordersTable');
    el.innerHTML = '<div class="loading">Loading orders...</div>';

    const { data, error } = await sb.from('orders').select('*').order('created_at', { ascending: false });

    if (error) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">Could not load orders. Check your Supabase table name.</div></div>';
      return;
    }

    if (!data || data.length === 0) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">No orders yet. Share your store and start selling!</div></div>';
      updateStats([]); return;
    }

    updateStats(data);

    el.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Phone</th>
            <th>Product</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Tracking (AWB)</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
          ${data.map(o => `
            <tr>
              <td style="font-family:monospace;font-size:11px;color:var(--muted)">#${String(o.id).slice(0,8)}</td>
              <td>${o.customer_name || '—'}</td>
              <td>${o.phone || '—'}</td>
              <td>${o.product_name || '—'}</td>
              <td style="color:var(--accent2);font-weight:500">₹${o.amount || '—'}</td>
              <td><span class="status-badge status-${(o.status||'pending').toLowerCase()}">${o.status || 'Pending'}</span></td>
              <td>
                <input class="tracking-input" id="track-${o.id}" placeholder="Enter AWB" value="${o.tracking_number || ''}" />
                <button class="save-btn" onclick="saveTracking('${o.id}')">Save</button>
              </td>
              <td style="color:var(--muted);font-size:12px">${o.created_at ? new Date(o.created_at).toLocaleDateString('en-IN') : '—'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  // ── Update Stats ──
  function updateStats(orders) {
    document.getElementById('statTotal').textContent = orders.length;
    document.getElementById('statPending').textContent = orders.filter(o => !o.status || o.status === 'pending').length;
    document.getElementById('statShipped').textContent = orders.filter(o => o.status === 'shipped').length;
    document.getElementById('statDelivered').textContent = orders.filter(o => o.status === 'delivered').length;
  }

  // ── Save Tracking Number ──
  async function saveTracking(orderId) {
    const val = document.getElementById('track-' + orderId).value.trim();
    const { error } = await sb.from('orders').update({ tracking_number: val, status: 'shipped' }).eq('id', orderId);
    if (!error) alert('✅ Tracking saved! Status updated to Shipped.');
    else alert('Error saving. Check your Supabase permissions.');
  }

  // ── Load Products ──
  async function loadProducts() {
    const el = document.getElementById('productsTable');
    el.innerHTML = '<div class="loading">Loading...</div>';
    const { data, error } = await sb.from('products').select('*');
    if (error || !data || data.length === 0) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">🏋️</div><div class="empty-text">No products found in your Supabase products table.</div></div>';
      return;
    }
    el.innerHTML = `<table><thead><tr><th>Name</th><th>Price</th><th>Stock</th></tr></thead><tbody>
      ${data.map(p => `<tr><td>${p.name||'—'}</td><td style="color:var(--accent2)">₹${p.price||'—'}</td><td>${p.stock ?? '—'}</td></tr>`).join('')}
    </tbody></table>`;
  }

  // ── Load Customers ──
  async function loadCustomers() {
    const el = document.getElementById('customersTable');
    el.innerHTML = '<div class="loading">Loading...</div>';
    const { data, error } = await sb.from('customers').select('*');
    if (error || !data || data.length === 0) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-text">No customers found in your Supabase customers table.</div></div>';
      return;
    }
    el.innerHTML = `<table><thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Joined</th></tr></thead><tbody>
      ${data.map(c => `<tr><td>${c.name||'—'}</td><td>${c.email||'—'}</td><td>${c.phone||'—'}</td><td style="color:var(--muted);font-size:12px">${c.created_at ? new Date(c.created_at).toLocaleDateString('en-IN') : '—'}</td></tr>`).join('')}
    </tbody></table>`;
  }

  // Enter key to login
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
